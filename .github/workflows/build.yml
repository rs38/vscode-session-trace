name: Build VSIX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: win32-x64
          - os: windows-latest
            target: win32-arm64
          - os: macos-latest
            target: darwin-arm64
          - os: ubuntu-latest
            target: darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch native sqlite3 for WinARM64
        if: matrix.target == 'win32-arm64'
        run: |
          mkdir -p node_modules/@vscode/sqlite3/build/Release
          curl -L "https://github.com/AppThreat/node-sqlite3/releases/download/v7.0.3/sqlite3-v7.0.3-napi-v10-win32-arm64.tar.gz" -o sqlite3.tar.gz
          tar -xzf sqlite3.tar.gz
          cp build/Release/node_sqlite3.node node_modules/@vscode/sqlite3/build/Release/vscode-sqlite3.node
        shell: bash

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: '*.vsix'
          if-no-files-found: error
